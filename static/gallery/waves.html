<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>waves</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html, body {
				width: 100%;
				height: 100%;
				overflow: hidden;
			}
			#canvas {
				display: block;
				width: 100vw;
				height: 100vh;
			}
		</style>
	</head>

	<body>
		<canvas id="canvas"></canvas>
		<script>
			const canvas = document.getElementById('canvas');
			const ctx = canvas.getContext('2d');

			function resize() {
				canvas.width = window.innerWidth;
				canvas.height = window.innerHeight;
			}

			window.addEventListener('resize', resize);
			resize();

			let time = 0;
			let dayNightCycle = 0;
			let cycleDirection = 1;

			const oceanColors = [
				{ r: 100, g: 180, b: 220 },
				{ r: 70, g: 150, b: 200 },
				{ r: 85, g: 165, b: 210 }
			];

			const sandColors = [
				{ r: 160, g: 145, b: 120 },
				{ r: 175, g: 155, b: 130 },
				{ r: 150, g: 135, b: 110 }
			];

			function interpolateColor(color1, color2, t) {
				return {
					r: Math.round(color1.r + (color2.r - color1.r) * t),
					g: Math.round(color1.g + (color2.g - color1.g) * t),
					b: Math.round(color1.b + (color2.b - color1.b) * t)
				};
			}

			const waves = [];
			const waveCount = 8;

			for (let i = 0; i < waveCount; i++) {
				waves.push({
					baseY: 0.5 + (i * 0.08),
					amplitude: 30 + i * 15,
					frequency: 0.003 + i * 0.0002,
					speed: (i % 2 === 0 ? 1 : -1) * (0.2 + i * 0.05),
					offset: Math.random() * Math.PI * 2,
					alpha: 0.7 - i * 0.05,
					colorIndex: i % 3
				});
			}

			function drawWave(wave, w, h, waveColors, t) {
				const y = wave.baseY * h;
				const color = waveColors[wave.colorIndex];
				
				ctx.beginPath();
				ctx.moveTo(0, h);
				
				for (let x = 0; x <= w; x += 3) {
					const waveY = Math.sin(x * wave.frequency + time * wave.speed + wave.offset) * wave.amplitude;
					ctx.lineTo(x, y + waveY);
				}
				
				ctx.lineTo(w, h);
				ctx.closePath();
				
				const gradient = ctx.createLinearGradient(0, y - wave.amplitude, 0, h);
				gradient.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, ${wave.alpha * (1 - t * 0.3)})`);
				gradient.addColorStop(1, `rgba(${color.r - 30}, ${color.g - 30}, ${color.b - 30}, ${wave.alpha * (1 - t * 0.3)})`);
				ctx.fillStyle = gradient;
				ctx.fill();
			}

			function draw() {
				const w = canvas.width;
				const h = canvas.height;

				time += 0.01;
				dayNightCycle += 0.0002 * cycleDirection;
				if (dayNightCycle >= 1 || dayNightCycle <= 0) {
					cycleDirection *= -1;
					dayNightCycle = Math.max(0, Math.min(1, dayNightCycle));
				}

				// Sky transitions first (0 to 0.5), then waves transition (0.5 to 1)
				const skyTransition = Math.min(1, dayNightCycle * 2);
				const waveTransition = Math.max(0, (dayNightCycle - 0.5) * 2);

				const skyColorDusk = { r: 60, g: 80, b: 120 };
				const skyColorNight = { r: 8, g: 12, b: 30 };
				const skyColor = interpolateColor(skyColorDusk, skyColorNight, skyTransition);

				const gradient = ctx.createLinearGradient(0, 0, 0, h);
				gradient.addColorStop(0, `rgb(${skyColor.r}, ${skyColor.g}, ${skyColor.b})`);
				gradient.addColorStop(0.6, `rgb(${skyColor.r + 20}, ${skyColor.g + 15}, ${skyColor.b + 10})`);
				ctx.fillStyle = gradient;
				ctx.fillRect(0, 0, w, h);

				for (let i = waves.length - 1; i >= 0; i--) {
					const currentColors = [];
					for (let j = 0; j < 3; j++) {
						currentColors.push(interpolateColor(oceanColors[j], sandColors[j], waveTransition));
					}
					drawWave(waves[i], w, h, currentColors, waveTransition);
				}

				requestAnimationFrame(draw);
			}

			draw();
		</script>
	</body>
</html>
