<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Night</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0e1a;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        let time = 0;
        let colorCycle = 0;

        // Three color schemes
        const colorSchemes = [
            // Original scheme (dark grays/browns)
            {
                sky: ['#0a0e1a', '#161820'],
                layers: [
                    '#08090f', '#08090f', '#090b11', '#090c12', '#0a0e14', '#0b0e14', '#0c0f15', '#0d1016',
                    '#0f1218', '#101217', '#111316', '#111418', '#12141a', '#13151b', '#14161c', '#15171d',
                    '#16171e', '#18191f', '#1a1820', '#1b1921', '#1c1a22', '#1d1b22', '#1e1b23', '#1e1c23',
                    '#1f1c24', '#201d24', '#211d25', '#221e25', '#231e26', '#241f27', '#252028', '#252027',
                    '#261f27', '#261f26', '#271e25', '#271e24', '#281e23', '#281e23', '#281e22', '#281e21',
                    '#291f20', '#291f1f', '#2a1f1e', '#2a1f1d', '#2a1f1a', '#2a1f19', '#2b1f18', '#2b1f17'
                ]
            },
            // Blue/purple to olive scheme
            {
                sky: ['#0a0c1c', '#1a1c2c'],
                layers: [
                    '#0d0f1f', '#0f1123', '#111327', '#13152b', '#15172f', '#171933', '#191b37', '#1b1d3b',
                    '#1d1f3f', '#1f2143', '#212343', '#232542', '#252741', '#272940', '#292b3f', '#2b2d3e',
                    '#2d2f3d', '#2f313c', '#31333b', '#33353a', '#353739', '#373938', '#393b37', '#3b3d36',
                    '#3d3f35', '#3f4034', '#414233', '#434432', '#454631', '#474830', '#494a2f', '#4b4c2e',
                    '#4d4e2d', '#4f502c', '#51522b', '#53542a', '#555629', '#575828', '#595a27', '#5b5c26',
                    '#5d5e25', '#5f6024', '#616223', '#636422', '#656621', '#676820', '#696a1f', '#6b6c1e'
                ]
            },
            // Magenta to yellow scheme
            {
                sky: ['#1a0a1c', '#2a1a2c'],
                layers: [
                    '#1f0d1f', '#230f23', '#271127', '#2b132b', '#2f152f', '#331733', '#371937', '#3b1b3b',
                    '#3f1d3f', '#431f43', '#472143', '#4a2342', '#4d2541', '#502740', '#53293f', '#562b3e',
                    '#592d3d', '#5c2f3c', '#5f313b', '#62333a', '#653539', '#683738', '#6b3937', '#6e3b36',
                    '#713d35', '#743f34', '#774233', '#7a4432', '#7d4631', '#804830', '#834a2f', '#864c2e',
                    '#894e2d', '#8c502c', '#8f522b', '#92542a', '#955629', '#985828', '#9b5a27', '#9e5c26',
                    '#a15e25', '#a46024', '#a76223', '#aa6422', '#ad6621', '#b06820', '#b36a1f', '#b66c1e'
                ]
            }
        ];

        function interpolateColor(color1, color2, factor) {
            const r1 = parseInt(color1.slice(1, 3), 16);
            const g1 = parseInt(color1.slice(3, 5), 16);
            const b1 = parseInt(color1.slice(5, 7), 16);
            
            const r2 = parseInt(color2.slice(1, 3), 16);
            const g2 = parseInt(color2.slice(3, 5), 16);
            const b2 = parseInt(color2.slice(5, 7), 16);
            
            const r = Math.round(r1 + (r2 - r1) * factor);
            const g = Math.round(g1 + (g2 - g1) * factor);
            const b = Math.round(b1 + (b2 - b1) * factor);
            
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function getCurrentColors() {
            const schemeIndex = Math.floor(colorCycle) % 3;
            const nextSchemeIndex = (schemeIndex + 1) % 3;
            const factor = colorCycle - Math.floor(colorCycle);
            
            const currentScheme = colorSchemes[schemeIndex];
            const nextScheme = colorSchemes[nextSchemeIndex];
            
            return {
                sky: [
                    interpolateColor(currentScheme.sky[0], nextScheme.sky[0], factor),
                    interpolateColor(currentScheme.sky[1], nextScheme.sky[1], factor)
                ],
                layers: currentScheme.layers.map((color, i) => 
                    interpolateColor(color, nextScheme.layers[i], factor)
                )
            };
        }

        // Generate layers of buildings (parallax)
        const layers = [
            { buildings: [], speed: 0.05 },   // Farthest back
            { buildings: [], speed: 0.06 },
            { buildings: [], speed: 0.07 },
            { buildings: [], speed: 0.09 },
            { buildings: [], speed: 0.11 },
            { buildings: [], speed: 0.12 },
            { buildings: [], speed: 0.14 },
            { buildings: [], speed: 0.16 },
            { buildings: [], speed: 0.19 },
            { buildings: [], speed: 0.21 },
            { buildings: [], speed: 0.23 },
            { buildings: [], speed: 0.25 },
            { buildings: [], speed: 0.28 },
            { buildings: [], speed: 0.31 },
            { buildings: [], speed: 0.34 },
            { buildings: [], speed: 0.36 },
            { buildings: [], speed: 0.39 },
            { buildings: [], speed: 0.42 },
            { buildings: [], speed: 0.45 },
            { buildings: [], speed: 0.48 },
            { buildings: [], speed: 0.51 },
            { buildings: [], speed: 0.53 },
            { buildings: [], speed: 0.56 },
            { buildings: [], speed: 0.59 },
            { buildings: [], speed: 0.62 },
            { buildings: [], speed: 0.65 },
            { buildings: [], speed: 0.68 },
            { buildings: [], speed: 0.70 },
            { buildings: [], speed: 0.73 },
            { buildings: [], speed: 0.76 },
            { buildings: [], speed: 0.79 },
            { buildings: [], speed: 0.81 },
            { buildings: [], speed: 0.84 },
            { buildings: [], speed: 0.86 },
            { buildings: [], speed: 0.89 },
            { buildings: [], speed: 0.92 },
            { buildings: [], speed: 0.95 },
            { buildings: [], speed: 0.98 },
            { buildings: [], speed: 1.01 },
            { buildings: [], speed: 1.04 },
            { buildings: [], speed: 1.08 },
            { buildings: [], speed: 1.11 },
            { buildings: [], speed: 1.15 },
            { buildings: [], speed: 1.19 },
            { buildings: [], speed: 1.23 },
            { buildings: [], speed: 1.27 },
            { buildings: [], speed: 1.32 },
            { buildings: [], speed: 1.37 }    // Front
        ];

        // Generate random buildings for each layer
        layers.forEach((layer, index) => {
            let x = 0;
            while (x < canvas.width * 2) {
                const width = 15 + Math.random() * 40;
                // Farther layers (index 0) = tall, closer layers (index 47) = short
                const minHeight = 100 + ((47 - index) * 20);
                const maxHeight = 200 + ((47 - index) * 30);
                const height = minHeight + Math.random() * (maxHeight - minHeight);
                layer.buildings.push({ x, width, height });
                x += width;
            }
        });

        function animate() {
            colorCycle += 0.0002; // Slow color transition

            const colors = getCurrentColors();

            // Dark night sky
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, colors.sky[0]);
            gradient.addColorStop(1, colors.sky[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw each layer with parallax
            layers.forEach((layer, index) => {
                ctx.fillStyle = colors.layers[index];
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
                const offset = (time * layer.speed) % (canvas.width * 2);
                
                layer.buildings.forEach(building => {
                    const x = building.x - offset;
                    const y = canvas.height - building.height;
                    
                    // Draw building fill
                    ctx.fillRect(x, y, building.width, building.height);
                    // Draw building outline
                    ctx.strokeRect(x, y, building.width, building.height);
                    
                    // Draw duplicate for seamless loop
                    if (x < 0) {
                        ctx.fillRect(x + canvas.width * 2, y, building.width, building.height);
                        ctx.strokeRect(x + canvas.width * 2, y, building.width, building.height);
                    }
                });
            });

            time += 1;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
